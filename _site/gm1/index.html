      for (var j = 0; j < dRiders.length; j++) delete dRiders[j]._drUsed;
      dRiders = newDRiders;
      // Remove dead riders
      dRiders = dRiders.filter(function(r) { return r.alive; });

      // Sync platform states
      var platStates = msg.plats || [];
      for (var i = 0; i < platStates.length; i++) {
        var ps = platStates[i];
        for (var j = 0; j < plats.length; j++) {
          if (plats[j].id === ps.id) {
            plats[j].alive = ps.alive;
            if (ps.w !== undefined) plats[j].w = ps.w;
            break;
          }
        }
      }

      // Rebuild allB
      allB = gameBirds.concat(aiBirds, dBirds).filter(function (b) { return b.alive; });
    }

    // ============================================================
    // INPUT (sends to host in game mode)
    // ============================================================
    var inputSendTimer = 0;
    var INPUT_SEND_INTERVAL = 0.1; // 10Hz
    var inputDiagLogged = 0;
    function sendInputToHost() {
      if (isHost) return;
      inputDiagLogged++;
      // Diagnostic: log first few sends and periodic check
      if (inputDiagLogged === 1 || inputDiagLogged === 60 || inputDiagLogged === 300) {
        var dcCount = 0, dcInfo = [];
        for (var pid in dataChannels) {
          dcCount++;
          var dc = dataChannels[pid];
          dcInfo.push({ pid: pid.slice(0,4), state: dc ? dc.readyState : 'null', buf: dc ? dc.bufferedAmount : -1 });
        }
        console.log('INPUT DIAG #' + inputDiagLogged + ': dcCount=' + dcCount + ' ch=' + JSON.stringify(dcInfo) + ' inSent=' + inputsSent + ' timer=' + inputSendTimer.toFixed(3) + ' lastKeys=' + lastSentKeys.slice(0,20));
      }
      inputSendTimer += 0.016;
      var hasChange = false;
      var keyStr = JSON.stringify(keys) + (flapEdge ? '1' : '0');
      if (keyStr !== lastSentKeys) { lastSentKeys = keyStr; hasChange = true; }
      if (hasChange || inputSendTimer >= INPUT_SEND_INTERVAL) {
        inputSendTimer = 0;
        inputsSent++;
        broadcast({
          type: 'input',
          peerId: myPeerId,
          keys: { l: keys.l, r: keys.r, flap: keys.flap, dn: keys.dn },
          flapEdge: flapEdge
        });
      }
    }

    // ============================================================
    // RENDERING: LOBBY
    // ============================================================
    function renderLobby() {
      var scX = canvas.width / GW, scY = canvas.height / GH, sc = Math.min(scX, scY);
      var oX = (canvas.width - GW * sc) / 2, oY = (canvas.height - GH * sc) / 2;
      ctx.fillStyle = '#000'; ctx.fillRect(0, 0, canvas.width, canvas.height);
      ctx.save(); ctx.translate(oX, oY); ctx.scale(sc, sc);

      // Title
      ctx.fillStyle = '#fff'; ctx.font = 'bold 48px monospace'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
      ctx.fillText('JOUSTINE MULTIPLAYER', GW * 0.5, 50);

      // Level chooser (top center)
      var lvY = 110;
      ctx.fillStyle = '#888'; ctx.font = 'bold 36px monospace'; ctx.textAlign = 'center';
      // Left arrow
      ctx.fillStyle = selectedLevel > 1 ? '#fff' : '#444';
      ctx.fillText('<', GW * 0.35, lvY);
      // Level name
      ctx.fillStyle = '#0ff'; ctx.font = 'bold 32px monospace';
      ctx.fillText(getLevelName(selectedLevel), GW * 0.5, lvY);
      // Right arrow
      ctx.fillStyle = selectedLevel < 100 ? '#fff' : '#444';
      ctx.font = 'bold 36px monospace';
      ctx.fillText('>', GW * 0.65, lvY);

      // 3x4 grid of player slots (left 40%)
      var gridLeft = 40, gridTop = 160;
      var slotW = (GW * 0.38 - 60) / 3;
      var slotH = (GH - gridTop - 40) / 4;
      var gap = 10;

      for (var i = 0; i < 12; i++) {
        var col = i % 3, row = Math.floor(i / 3);
        var sx = gridLeft + col * (slotW + gap);
        var sy = gridTop + row * (slotH + gap);
        var slot = slots[i];
        var color = SLOT_COLORS[i];
        var isOccupied = slot.peerId !== null;
        var isMe = slot.peerId === myPeerId;

        // Background
        ctx.globalAlpha = isOccupied ? 0.8 : 0.2;
        ctx.fillStyle = color.hex;
        // Rounded rect
        var cr = 12;
        ctx.beginPath();
        ctx.moveTo(sx + cr, sy); ctx.lineTo(sx + slotW - cr, sy);
        ctx.quadraticCurveTo(sx + slotW, sy, sx + slotW, sy + cr);
        ctx.lineTo(sx + slotW, sy + slotH - cr);
        ctx.quadraticCurveTo(sx + slotW, sy + slotH, sx + slotW - cr, sy + slotH);
        ctx.lineTo(sx + cr, sy + slotH);
        ctx.quadraticCurveTo(sx, sy + slotH, sx, sy + slotH - cr);
        ctx.lineTo(sx, sy + cr);
        ctx.quadraticCurveTo(sx, sy, sx + cr, sy);
        ctx.closePath();
        ctx.fill();
        ctx.globalAlpha = 1;

        // Pulse if ready
        if (slot.ready) {
          ctx.globalAlpha = 0.3 + 0.2 * Math.sin(performance.now() / 200);
          ctx.strokeStyle = color.hex;
          ctx.lineWidth = 3;
          ctx.stroke();
          ctx.globalAlpha = 1;
        }

        // Border for own slot
        if (isMe) {
          ctx.strokeStyle = '#fff';
          ctx.lineWidth = 2;
          ctx.stroke();
        }

        // Color name
        ctx.fillStyle = isOccupied ? '#000' : '#888';
        ctx.font = 'bold 18px monospace'; ctx.textAlign = 'center'; ctx.textBaseline = 'top';
        ctx.fillText(color.name.toUpperCase(), sx + slotW / 2, sy + 8);

        // Status text
        ctx.font = '14px monospace'; ctx.textBaseline = 'middle';
        var statusY = sy + slotH / 2 + 5;
        if (!isOccupied) {
          ctx.fillStyle = '#666';
          ctx.fillText('Available', sx + slotW / 2, statusY);
        } else if (slot.ready) {
          ctx.fillStyle = '#000';
          ctx.font = 'bold 20px monospace';
          ctx.fillText('READY!', sx + slotW / 2, statusY);
        } else if (slot.holding) {
          ctx.fillStyle = '#000';
          ctx.fillText(Math.round(slot.progress) + '%', sx + slotW / 2, statusY);
        } else {
          ctx.fillStyle = '#333';
          ctx.fillText(slot.deviceInfo || 'Joined', sx + slotW / 2, statusY);
        }

        // Progress ring
        if (slot.holding && !slot.ready) {
          var cx = sx + slotW / 2, cy = sy + slotH - 25;
          var ringR = 15;
          ctx.beginPath();
          ctx.arc(cx, cy, ringR, 0, Math.PI * 2);
          ctx.strokeStyle = 'rgba(0,0,0,0.3)';
          ctx.lineWidth = 4;
          ctx.stroke();

          ctx.beginPath();
          var startAngle = -Math.PI / 2;
          var endAngle = startAngle + (slot.progress / 100) * Math.PI * 2;
          ctx.arc(cx, cy, ringR, startAngle, endAngle);
          ctx.strokeStyle = '#fff';
          ctx.lineWidth = 4;
          ctx.stroke();
        }

        // Peer ID (small)
        if (isOccupied) {
          ctx.fillStyle = 'rgba(0,0,0,0.5)';
          ctx.font = '10px monospace'; ctx.textBaseline = 'bottom';
          ctx.fillText(slot.peerId.slice(0, 4), sx + slotW / 2, sy + slotH - 4);
        }
      }

      // QR code (right side)
      if (qrCanvas) {
        var qrSize = Math.min(400, GH - 250);
        var qrX = GW * 0.55 + (GW * 0.45 - qrSize) / 2;
        var qrY = 180;
        // URL text above QR
        ctx.fillStyle = '#aaa'; ctx.font = '20px monospace'; ctx.textAlign = 'center'; ctx.textBaseline = 'bottom';
        var displayUrl = 'erd.mmec.ca/gm1/?room=' + (window._qrRoomCode || window._roomCode || '');
        ctx.fillText(displayUrl, qrX + qrSize / 2, qrY - 10);
        // Draw QR with white background
        ctx.fillStyle = '#fff';
        ctx.fillRect(qrX - 10, qrY - 10, qrSize + 20, qrSize + 20);
        ctx.drawImage(qrCanvas, qrX, qrY, qrSize, qrSize);
      }

      // Host indicator
      ctx.fillStyle = '#666'; ctx.font = '14px monospace'; ctx.textAlign = 'left'; ctx.textBaseline = 'bottom';
      var hostText = isHost ? 'You are HOST' : ('Host: ' + (hostPeerId ? hostPeerId.slice(0, 4) : '?'));
      ctx.fillText(hostText, 40, GH - 10);

      // Peer count
      var peerCount = Object.keys(connectedPeerIds).length;
      ctx.fillStyle = '#666'; ctx.textAlign = 'right';
      ctx.fillText('Peers: ' + peerCount + ' | ' + myPeerId.slice(0, 4), GW - 20, GH - 10);

      // Instructions
      ctx.fillStyle = '#888'; ctx.font = '16px monospace'; ctx.textAlign = 'center'; ctx.textBaseline = 'bottom';
      ctx.fillText('Hold SPACE or TAP to claim a slot and ready up', GW * 0.5, GH - 30);

      // Countdown overlay
      if (lobbyState === 'countdown') {
        ctx.fillStyle = 'rgba(0,0,0,0.5)';
        ctx.fillRect(0, 0, GW, GH);
        ctx.fillStyle = '#0ff'; ctx.font = 'bold 120px monospace'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
        ctx.fillText(Math.ceil(countdownTimer), GW / 2, GH / 2);
        ctx.font = 'bold 32px monospace'; ctx.fillStyle = '#fff';
        ctx.fillText('STARTING...', GW / 2, GH / 2 + 80);
      }

      ctx.textAlign = 'right'; ctx.font = '16px monospace'; ctx.fillStyle = '#444'; ctx.textBaseline = 'top';
      ctx.fillText(BUILD, GW - 20, 10);
      ctx.restore();
    }

    // ============================================================
    // RENDERING: GAME
    // ============================================================
    function toScr(gx, gy) { return { x: gx, y: GH - gy }; }

    function renderGame() {
      var scX = canvas.width / GW, scY = canvas.height / GH, sc = Math.min(scX, scY);
      var oX = (canvas.width - GW * sc) / 2, oY = (canvas.height - GH * sc) / 2;
      ctx.fillStyle = '#000'; ctx.fillRect(0, 0, canvas.width, canvas.height);
      ctx.save(); ctx.translate(oX, oY); ctx.scale(sc, sc);
      ctx.beginPath(); ctx.rect(0, 0, GW, GH); ctx.clip();

      // Background gradient (warmer at higher levels)
      var grad = ctx.createLinearGradient(0, 0, 0, GH);
      var bgR = Math.min(30, 10 + wave * 0.5), bgG = 10, bgB = Math.max(15, 26 - wave * 0.3);
      grad.addColorStop(0, 'rgb(' + Math.round(bgR) + ',' + Math.round(bgG) + ',' + Math.round(bgB) + ')');
      grad.addColorStop(1, 'rgb(' + Math.round(bgR * 1.5) + ',' + Math.round(bgG * 1.5) + ',' + Math.round(bgB * 1.7) + ')');
      ctx.fillStyle = grad; ctx.fillRect(0, 0, GW, GH);

      // Stars
      ctx.fillStyle = '#ffffff40';
      for (var i = 0; i < 60; i++) ctx.fillRect((i * 397) % GW, (i * 251) % (GH * 0.6), 2, 2);

      // Rain
      if (rainDrops.length > 0) {
        ctx.strokeStyle = 'rgba(180,190,210,0.3)'; ctx.lineWidth = 1;
        ctx.beginPath();
        for (var ri = 0; ri < rainDrops.length; ri++) {
          var rd = rainDrops[ri], rsp = toScr(rd.x, rd.y), rsp2 = toScr(rd.x + rd.vx * 0.01, rd.y + rd.vy * 0.01);
          ctx.moveTo(rsp.x, rsp.y); ctx.lineTo(rsp2.x, rsp2.y - rd.len);
        }
        ctx.stroke();
      }

      // Platforms
      for (var i = 0; i < plats.length; i++) {
        var p = plats[i]; if (!p.alive) continue;
        var sp = toScr(p.x, p.y);
        ctx.fillStyle = p.col; ctx.fillRect(sp.x - p.w / 2, sp.y - p.h / 2, p.w, p.h);
        ctx.fillStyle = '#ffffff20'; ctx.fillRect(sp.x - p.w / 2, sp.y - p.h / 2, p.w, 3);
        if (p.wrap) {
          var wx = p.id === 'left_mid' ? sp.x + GW : sp.x - GW;
          ctx.fillStyle = p.col; ctx.fillRect(wx - p.w / 2, sp.y - p.h / 2, p.w, p.h);
          ctx.fillStyle = '#ffffff20'; ctx.fillRect(wx - p.w / 2, sp.y - p.h / 2, p.w, 3);
        }
      }

      // Lava
      if (lavaH !== null && (lavaPeaks.length > 0 || lavaBaseH > 0)) {
        var lt = GH - lavaBaseH;
        ctx.beginPath(); ctx.moveTo(0, GH);
        for (var x = 0; x <= GW; x += 8) {
          var surfH = lavaBaseH;
          for (var pi = 0; pi < lavaPeaks.length; pi++) surfH += peakHeightAt(lavaPeaks[pi], x);
          ctx.lineTo(x, GH - surfH);
        }
        ctx.lineTo(GW, GH); ctx.closePath();
        var lg = ctx.createLinearGradient(0, lt, 0, GH);
        lg.addColorStop(0, '#ff4400'); lg.addColorStop(0.3, '#cc2200'); lg.addColorStop(1, '#661100');
        ctx.fillStyle = lg; ctx.fill();
        for (var bi = 0; bi < lavaBubbles.length; bi++) {
          var lb = lavaBubbles[bi], lbs = toScr(lb.x, lb.y);
          ctx.globalAlpha = lb.life / lb.maxLife * 0.6;
          ctx.beginPath(); ctx.arc(lbs.x, lbs.y, lb.r, 0, Math.PI * 2);
          ctx.strokeStyle = '#ff8800'; ctx.lineWidth = 1.5; ctx.stroke(); ctx.globalAlpha = 1;
        }
        for (var ei = 0; ei < lavaEruptions.length; ei++) {
          var le = lavaEruptions[ei], les = toScr(le.x, le.y);
          ctx.globalAlpha = Math.min(1, le.life * 2); ctx.fillStyle = '#ff6600';
          ctx.beginPath(); ctx.arc(les.x, les.y, 3 + Math.random() * 2, 0, Math.PI * 2); ctx.fill();
          ctx.fillStyle = '#ffaa00';
          ctx.beginPath(); ctx.arc(les.x + Math.random() * 4 - 2, les.y + Math.random() * 4 - 2, 2, 0, Math.PI * 2); ctx.fill();
          ctx.globalAlpha = 1;
        }
      }

      // Sparks
      for (var si = 0; si < sparks.length; si++) {
        var sk = sparks[si], sks = toScr(sk.x, sk.y);
        ctx.globalAlpha = sk.life * 3; ctx.fillStyle = sk.col;
        ctx.fillRect(sks.x - 1, sks.y - 1, 3, 3); ctx.globalAlpha = 1;
      }

      // All birds (players + AI + death)
      var renderBirds = allB;
      for (var i = 0; i < renderBirds.length; i++) {
        var bird = renderBirds[i]; if (!bird.alive) continue;
        if (bird.resp) { if (Math.floor(bird.respT * 10) % 2 === 0) { ctx.globalAlpha = 0.5; drawBird(bird); ctx.globalAlpha = 1; } continue; }
        drawBird(bird);
      }

      // Dismounted riders
      for (var i = 0; i < dRiders.length; i++) {
        var r = dRiders[i]; if (!r.alive || r.mounted) continue;
        // Smoke particles
        for (var j = 0; j < r.smokeParticles.length; j++) {
          var sp2 = r.smokeParticles[j]; var sps = toScr(sp2.x, sp2.y);
          var alpha = sp2.life / sp2.maxLife * 0.6;
          ctx.globalAlpha = alpha; ctx.fillStyle = '#888';
          ctx.beginPath(); ctx.arc(sps.x, sps.y, 3 + 4 * (1 - sp2.life / sp2.maxLife), 0, Math.PI * 2); ctx.fill(); ctx.globalAlpha = 1;
        }
        // Blinking red when cooking
        if (r.heat > HEAT_WARN) {
          var blink = Math.sin(gameTime * 15) > 0;
          if (blink) { ctx.globalAlpha = 0.5; }
        }
        drawRider(r, toScr(r.x, r.y));
        ctx.globalAlpha = 1;
      }

      // Respawn indicators
      for (var bi = 0; bi < gameBirds.length; bi++) {
        var pb = gameBirds[bi];
        if (pb.resp) {
          var rsp = toScr(pb.x, GH - 30);
          ctx.fillStyle = pb.col; ctx.globalAlpha = 0.5 + 0.5 * Math.sin(gameTime * 8);
          ctx.beginPath(); ctx.moveTo(rsp.x - 15, rsp.y - 10); ctx.lineTo(rsp.x + 15, rsp.y - 10); ctx.lineTo(rsp.x, rsp.y + 15); ctx.closePath(); ctx.fill();
          ctx.font = '16px monospace'; ctx.textAlign = 'center'; ctx.fillText('FLAP TO DROP', rsp.x, rsp.y - 20);
          ctx.globalAlpha = 1;
        }
      }

      // Floating texts
      for (var i = 0; i < fTexts.length; i++) {
        var ft = fTexts[i]; var sp = toScr(ft.x, ft.y);
        ctx.globalAlpha = Math.min(1, ft.life);
        ctx.fillStyle = '#fff'; ctx.font = 'bold 32px monospace'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
        ctx.fillText(ft.text, sp.x, sp.y); ctx.globalAlpha = 1;
      }

      // Wave start message
      if (waveStartT > 0) {
        ctx.globalAlpha = Math.min(1, waveStartT);
        ctx.fillStyle = '#fff'; ctx.font = 'bold 64px monospace'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
        ctx.fillText(waveStartMsg, GW / 2, GH * 0.35);
        if (waveSubMsg) { ctx.font = '24px monospace'; ctx.fillStyle = '#ccc'; ctx.fillText(waveSubMsg, GW / 2, GH * 0.42); }
        if (wave > 1) { ctx.font = '20px monospace'; ctx.fillStyle = '#888'; ctx.fillText('Scale: ' + (cfg.sf).toFixed(1) + 'x  |  Enemies: ' + cfg.birdCount, GW / 2, GH * 0.47); }
        ctx.globalAlpha = 1;
      }

      // HUD - per player lives display
      ctx.fillStyle = '#fff'; ctx.font = 'bold 28px monospace'; ctx.textAlign = 'left'; ctx.textBaseline = 'top';
      ctx.fillText('Wave ' + wave, 20, 20);
      // Per-player score and lives
      var hudY = 55;
      for (var pi = 0; pi < gameBirds.length; pi++) {
        var pb = gameBirds[pi];
        if (!pb.peerId) continue;
        var pLv = playerLives[pb.peerId] || 0;
        var pSc = playerScores[pb.peerId] || 0;
        var pCol = pb.origCol || pb.col || '#fff';
        var pName = pb.peerId.slice(0, 4);
        var isMe = pb.peerId === myPeerId;
        // Player name + score
        ctx.fillStyle = pCol; ctx.font = (isMe ? 'bold ' : '') + '22px monospace';
        ctx.fillText(pName + ': ' + pSc, 20, hudY);
        // Lives as bird icons in player color
        for (var li = 0; li < pLv; li++) {
          var lx = 200 + li * 22;
          ctx.fillStyle = pCol; ctx.beginPath(); ctx.ellipse(lx, hudY + 10, 7, 4, 0, 0, Math.PI * 2); ctx.fill();
        }
        if (pLv <= 0 && !(pb.alive || pb.resp)) {
          ctx.fillStyle = '#f44'; ctx.font = '16px monospace'; ctx.fillText('OUT', 200, hudY + 2);
        }
        hudY += 28;
      }
      ctx.fillStyle = '#888'; ctx.font = '16px monospace';
      ctx.fillText(isHost ? 'HOST' : 'Client', 20, hudY);

      // Enemy count
      var enemies = aiBirds.filter(function (b) { return b.alive && b.rider && b.rider.alive; }).length;
      var dismEnemies = dRiders.filter(function (r) { return r.alive && !r.isP; }).length;
      ctx.fillStyle = '#f88'; ctx.font = 'bold 22px monospace'; ctx.textAlign = 'right';
      ctx.fillText('Enemies: ' + (enemies + dismEnemies), GW - 20, 55);

      // Kill streak display
      if (killStreak > 1 && streakTimer > 0) {
        ctx.fillStyle = '#ff0'; ctx.font = 'bold 24px monospace'; ctx.textAlign = 'center';
        ctx.fillText(killStreak + 'x STREAK', GW / 2, 30);
      }

      // Dismounted notice
      if (ctrlMode === 'rider') { ctx.fillStyle = '#ff0'; ctx.font = 'bold 22px monospace'; ctx.textAlign = 'left'; ctx.fillText('DISMOUNTED - find a bird!', 20, 165); }

      // (player name labels above birds removed — color is self-evident)
      }

      ctx.textAlign = 'right'; ctx.font = '16px monospace'; ctx.fillStyle = '#444'; ctx.textBaseline = 'top';
      ctx.fillText(BUILD, GW - 20, 10);
      ctx.restore();

      // Touch zone flash overlays (orientation-aware)
      if ('ontouchstart' in window) {
        var cw = canvas.width, ch = canvas.height;
        var fontSize = Math.round(Math.min(cw, ch) * 0.06);
        ctx.save();
        ctx.font = 'bold ' + fontSize + 'px monospace';
        ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
        if (isPortrait()) {
          // Portrait: top 1/3 = status, bottom 2/3 = 6 zones (3 cols × 2 rows)
          // Upper row: LE(L+F) | FL(F) | RI(R+F)
          // Lower row: FT(L)   | AP(F) | TE(R)
          var zoneTop = ch / 3, zoneH = ch * 2 / 3, colW = cw / 3, halfH = zoneH / 2;
          // Status bar (top 1/3)
          ctx.fillStyle = '#000'; ctx.globalAlpha = 0.7;
          ctx.fillRect(0, 0, cw, zoneTop);
          ctx.globalAlpha = 1;
          var statusText = 'CONNECTING...'; var statusCol = '#888';
          if (lobbyState === 'game' || lobbyState === 'observer') {
            for (var si = 0; si < 12; si++) {
              if (slots[si].peerId === myPeerId) { statusText = SLOT_COLORS[si].name.toUpperCase(); statusCol = SLOT_COLORS[si].hex; break; }
            }
            if (statusText === 'CONNECTING...') { statusText = 'CONNECTED'; statusCol = '#0f0'; }
          }
          ctx.fillStyle = statusCol; ctx.font = 'bold ' + Math.round(zoneTop * 0.35) + 'px monospace';
          ctx.fillText(statusText, cw / 2, zoneTop / 2);
          // 6 zone labels: [col][row] → text
          ctx.font = 'bold ' + fontSize + 'px monospace';
          var pZones = [
            { flash: touchZoneFlash6.le, x: 0, y: zoneTop, w: colW, h: halfH, t1: 'L', t2: 'E' },
            { flash: touchZoneFlash6.fl, x: colW, y: zoneTop, w: colW, h: halfH, t1: 'F', t2: 'L' },
            { flash: touchZoneFlash6.ri, x: colW * 2, y: zoneTop, w: colW, h: halfH, t1: 'R', t2: 'I' },
            { flash: touchZoneFlash6.ft, x: 0, y: zoneTop + halfH, w: colW, h: halfH, t1: 'F', t2: 'T' },
            { flash: touchZoneFlash6.ap, x: colW, y: zoneTop + halfH, w: colW, h: halfH, t1: 'A', t2: 'P' },
            { flash: touchZoneFlash6.te, x: colW * 2, y: zoneTop + halfH, w: colW, h: halfH, t1: 'T', t2: 'E' }
          ];
          for (var zi = 0; zi < pZones.length; zi++) {
            var z = pZones[zi];
            if (z.flash > 0) {
              ctx.globalAlpha = z.flash * 0.4;
              ctx.fillStyle = '#fff'; ctx.fillRect(z.x, z.y, z.w, z.h);
              ctx.globalAlpha = z.flash;
              ctx.fillStyle = '#fff';
              ctx.fillText(z.t1, z.x + z.w / 2, z.y + z.h * 0.33);
              ctx.fillText(z.t2, z.x + z.w / 2, z.y + z.h * 0.67);
            }
          }
        } else {
          // Landscape: left 1/5=LEFT (walk only), next 1/5=RITE (walk only), right 1/5=FLAP
          var fifthW = cw / 5;
          var zones = [
            { flash: touchZoneFlash.l, x: 0, label: 'LEFT' },
            { flash: touchZoneFlash.r, x: fifthW, label: 'RITE' },
            { flash: touchZoneFlash.f, x: fifthW * 4, label: 'FLAP' }
          ];
          for (var zi = 0; zi < zones.length; zi++) {
            var z = zones[zi];
            if (z.flash > 0) {
              ctx.globalAlpha = z.flash * 0.4;
              ctx.fillStyle = '#fff'; ctx.fillRect(z.x, 0, fifthW, ch);
            }
          }
          // Horizontal text at very bottom of screen
          var labelY = ch - 8;
          var labelFontSize = Math.round(ch * 0.035);
          ctx.font = labelFontSize + 'px monospace';
          ctx.textBaseline = 'bottom';
          for (var zi = 0; zi < zones.length; zi++) {
            var z = zones[zi];
            if (z.flash > 0) {
              ctx.globalAlpha = z.flash;
              ctx.fillStyle = '#fff';
              var chars = z.label.split('');
              var charSpacing = fifthW / (chars.length + 1);
              for (var ci = 0; ci < chars.length; ci++) {
                ctx.fillText(chars[ci], z.x + charSpacing * (ci + 1), labelY);
              }
            }
          }
        }
        ctx.restore();
      }
    }

    function drawBird(bird) {
      var sp = toScr(bird.x, bird.y);
      var bw = bird.w, bh = bird.h;
      var facing = bird.vx < -10 ? -1 : bird.vx > 10 ? 1 : (bird.mDir || 1);
      var drawCol = bird.col;
      if (bird.type === 'player' && flashTimer > 0) { drawCol = 'rgba(255,255,255,' + (flashTimer / 0.9) + ')'; }

      // Speed trail
      if (bird.trail.length > 1) {
        ctx.save(); ctx.globalAlpha = 0.3; ctx.strokeStyle = bird.col; ctx.lineWidth = bird.w * 0.3; ctx.lineCap = 'round';
        ctx.beginPath();
        var t0 = toScr(bird.trail[0].x, bird.trail[0].y); ctx.moveTo(t0.x, t0.y);
        for (var ti = 1; ti < bird.trail.length; ti++) { var tp = toScr(bird.trail[ti].x, bird.trail[ti].y); ctx.lineTo(tp.x, tp.y); }
        ctx.lineTo(sp.x, sp.y); ctx.stroke(); ctx.globalAlpha = 1; ctx.restore();
      }

      // Halo
      ctx.save(); ctx.translate(sp.x, sp.y);
      var hr = Math.max(bw, bh) * 0.7;
      ctx.beginPath(); ctx.arc(0, 0, hr, 0, Math.PI * 2);
      ctx.fillStyle = bird.type === 'player' ? 'rgba(255,230,0,0.12)' : 'rgba(200,200,255,0.08)'; ctx.fill();
      ctx.strokeStyle = bird.type === 'player' ? 'rgba(255,230,0,0.3)' : 'rgba(200,200,255,0.15)'; ctx.lineWidth = 1.5; ctx.stroke();
      ctx.restore();

      // Draw order: wings → riders (screen space) → body+head
      var bodyW = bw * 0.55, bodyH = bh * 0.6;
      var wW = bw * 0.8, wH = bh * 1.2;

      // 1. Wings (in bird's squash/stretch space)
      ctx.save(); ctx.translate(sp.x, sp.y); ctx.scale(facing * bird.squashX, bird.squashY);
      ctx.save(); ctx.translate(-bw * 0.15, 0); ctx.rotate(-bird.wAng);
      ctx.beginPath(); ctx.moveTo(0, 0);
      ctx.quadraticCurveTo(-wW * 0.5, -wH * 0.5, -wW, -wH * 0.3);
      ctx.quadraticCurveTo(-wW * 1.1, -wH * 0.2, -wW * 0.8, 0);
      ctx.quadraticCurveTo(-wW * 0.5, wH * 0.2, 0, 0);
      ctx.fillStyle = drawCol; ctx.globalAlpha = 0.8; ctx.fill(); ctx.globalAlpha = 1; ctx.restore();
      ctx.save(); ctx.translate(bw * 0.15, 0); ctx.rotate(bird.wAng);
      ctx.beginPath(); ctx.moveTo(0, 0);
      ctx.quadraticCurveTo(wW * 0.5, -wH * 0.5, wW, -wH * 0.3);
      ctx.quadraticCurveTo(wW * 1.1, -wH * 0.2, wW * 0.8, 0);
      ctx.quadraticCurveTo(wW * 0.5, wH * 0.2, 0, 0);
      ctx.fillStyle = drawCol; ctx.globalAlpha = 0.8; ctx.fill(); ctx.globalAlpha = 1; ctx.restore();
      ctx.restore(); // end wings transform

      // 2. Mounted riders (game space, proportional to bird)
      if (bird.rider && bird.rider.mounted) {
        var riderFH = bh * 0.8; // proportional to bird height (always correct regardless of sf)
        var riderBaseY = sp.y - bh * 0.35; // sits on top of bird body
        var baseSpacing = bw * 0.25;
        var allRiders = [bird.rider];
        if (bird.passengers) { for (var pri = 0; pri < bird.passengers.length; pri++) allRiders.push(bird.passengers[pri]); }
        for (var ri = 0; ri < allRiders.length; ri++) {
          var rr = allRiders[ri];
          var offX = 0;
          if (ri > 0) {
            var passengerIdx = ri;
            var pair = Math.ceil(passengerIdx / 2);
            var spacing = baseSpacing / Math.pow(2, pair - 1);
            offX = (passengerIdx % 2 === 1) ? spacing : -spacing;
          }
          var fh = riderFH;
          var rHeadR = fh * 0.15, rlw = Math.max(1.5, fh * 0.06);
          ctx.save(); ctx.translate(sp.x + offX, riderBaseY);
          ctx.beginPath(); ctx.moveTo(0, -fh * 0.25); ctx.lineTo(0, fh * 0.05);
          ctx.strokeStyle = rr.col; ctx.lineWidth = rlw; ctx.stroke();
          ctx.beginPath(); ctx.arc(0, -fh * 0.25 - rHeadR, rHeadR, 0, Math.PI * 2);
          ctx.fillStyle = rr.col; ctx.fill(); ctx.strokeStyle = '#fff'; ctx.lineWidth = 1; ctx.stroke();
          ctx.beginPath(); ctx.moveTo(-fh * 0.16, -fh * 0.1); ctx.lineTo(0, -fh * 0.15); ctx.lineTo(fh * 0.16, -fh * 0.1);
          ctx.strokeStyle = rr.col; ctx.lineWidth = rlw * 0.7; ctx.stroke();
          ctx.beginPath(); ctx.moveTo(-fh * 0.07, fh * 0.05); ctx.lineTo(-fh * 0.09, fh * 0.18);
          ctx.moveTo(fh * 0.07, fh * 0.05); ctx.lineTo(fh * 0.09, fh * 0.18);
          ctx.stroke();
          ctx.restore();
        }
      }

      // 3. Body + head (in bird's squash/stretch space, in front of riders)
      ctx.save(); ctx.translate(sp.x, sp.y); ctx.scale(facing * bird.squashX, bird.squashY);

      // 3. Body (in front of rider)
      ctx.beginPath(); ctx.ellipse(0, 0, bodyW / 2, bodyH / 2, 0, 0, Math.PI * 2);
      ctx.fillStyle = drawCol; ctx.fill(); ctx.strokeStyle = '#00000040'; ctx.lineWidth = 1.5; ctx.stroke();

      // Death bird spikes
      if (bird.type === 'death') {
        ctx.strokeStyle = '#660000'; ctx.lineWidth = 2;
        for (var si = 0; si < 16; si++) {
          var sa = si * Math.PI * 2 / 16, sLen = bw * 0.25;
          ctx.beginPath(); ctx.moveTo(Math.cos(sa) * bodyW / 2 * 0.9, Math.sin(sa) * bodyH / 2 * 0.9);
          ctx.lineTo(Math.cos(sa) * (bodyW / 2 + sLen), Math.sin(sa) * (bodyH / 2 + sLen * 0.6)); ctx.stroke();
        }
        ctx.beginPath(); ctx.arc(-bodyW * 0.15, -bodyH * 0.1, bw * 0.12, 0, Math.PI * 2); ctx.fillStyle = '#fff'; ctx.fill();
        ctx.beginPath(); ctx.arc(-bodyW * 0.12, -bodyH * 0.1, bw * 0.06, 0, Math.PI * 2); ctx.fillStyle = '#000'; ctx.fill();
        ctx.beginPath(); ctx.arc(bodyW * 0.15, -bodyH * 0.1, bw * 0.12, 0, Math.PI * 2); ctx.fillStyle = '#fff'; ctx.fill();
        ctx.beginPath(); ctx.arc(bodyW * 0.18, -bodyH * 0.1, bw * 0.06, 0, Math.PI * 2); ctx.fillStyle = '#000'; ctx.fill();
        ctx.beginPath(); ctx.arc(0, bodyH * 0.05, bw * 0.08, 0, Math.PI); ctx.strokeStyle = '#000'; ctx.lineWidth = 2; ctx.stroke();
      }

      // 4. Head + beak (in front of everything, offset horizontally by headLean)
      var headR = bw * 0.15, headY = -(bodyH * 0.3);
      // headLean is in world space (-1=left, +1=right), but canvas is flipped by facing
      // Multiply by facing so the offset is correct in the flipped coordinate space
      var headOffX = bird.headLean * facing * bw * 0.15;
      ctx.save(); ctx.translate(headOffX, headY);
      ctx.beginPath(); ctx.arc(0, 0, headR, 0, Math.PI * 2); ctx.fillStyle = drawCol; ctx.fill();
      ctx.strokeStyle = '#fff'; ctx.lineWidth = 0.8; ctx.stroke();
      var bs = headR * 0.45;
      ctx.beginPath(); ctx.moveTo(-bs * 0.3, headR * 0.5); ctx.lineTo(bs * 0.3, headR * 0.5); ctx.lineTo(0, headR * 0.5 + bs * 0.7); ctx.closePath();
      ctx.fillStyle = '#d4a020'; ctx.fill();
      ctx.restore();

      // Legs (walking)
      if (bird.st === 'walk') {
        var legSwing = Math.sin(gameTime * 12) * bird.legH * 0.3;
        ctx.fillStyle = drawCol;
        ctx.save(); ctx.translate(-3 * bird.sf, bh / 2); ctx.rotate(legSwing * 0.02);
        ctx.fillRect(0, 0, 4 * bird.sf, bird.legH); ctx.restore();
        ctx.save(); ctx.translate(3 * bird.sf, bh / 2); ctx.rotate(-legSwing * 0.02);
        ctx.fillRect(0, 0, 4 * bird.sf, bird.legH); ctx.restore();
      }
      ctx.restore();

      // (passengers now drawn inline beside primary rider above)
    }

    // drawMountedRider is now inline in drawBird (between wings and body)
    function drawMountedRider(bird, sp) { /* no-op, handled inline */ }

    function drawRider(rider, sp) {
      ctx.save(); ctx.translate(sp.x, sp.y);
      var fh = rider.figH, headR = fh * 0.18, lw = Math.max(1.5, rider.w * 0.12);
      ctx.beginPath(); ctx.arc(0, -fh * 0.4, headR, 0, Math.PI * 2); ctx.fillStyle = rider.col; ctx.fill();
      ctx.strokeStyle = '#fff'; ctx.lineWidth = 1; ctx.stroke();
      ctx.beginPath(); ctx.moveTo(0, -fh * 0.4 + headR); ctx.lineTo(0, 0); ctx.strokeStyle = rider.col; ctx.lineWidth = lw; ctx.stroke();
      var aa = rider.st === 'fall' ? Math.sin(gameTime * 18) * 0.3 : 0;
      ctx.beginPath(); ctx.moveTo(-fh * 0.14, -fh * 0.2 + Math.sin(gameTime * 12 + aa) * 3); ctx.lineTo(0, -fh * 0.25);
      ctx.lineTo(fh * 0.14, -fh * 0.2 + Math.sin(gameTime * 12 + 1 + aa) * 3); ctx.stroke();
      var ls = rider.st === 'walk' ? Math.sin(gameTime * 9) * fh * 0.1 : fh * 0.05;
      ctx.beginPath(); ctx.moveTo(-ls, fh * 0.3); ctx.lineTo(0, 0); ctx.lineTo(ls, fh * 0.3); ctx.stroke();
      ctx.restore();
    }

    // ============================================================
    // INPUT HANDLING
    // ============================================================
    window.addEventListener('keydown', function (e) {
      initAudio();
      if (lobbyState === 'lobby' || lobbyState === 'countdown') {
        if (e.key === 'ArrowLeft') { changeLevel(-1); e.preventDefault(); return; }
        if (e.key === 'ArrowRight') { changeLevel(1); e.preventDefault(); return; }
        if (e.key === ' ' || e.key === 'ArrowUp') {
          startHold();
          e.preventDefault();
          return;
        }
      }
      if (lobbyState === 'gameover') {
        lobbyState = 'lobby'; mySlotIndex = -1; cfg = null;
        for (var si = 0; si < 12; si++) { slots[si].peerId = null; slots[si].ready = false; slots[si].progress = 0; slots[si].holding = false; }
        gameBirds = []; aiBirds = []; dBirds = []; dRiders = []; fTexts = [];
        e.preventDefault(); return;
      }
      if (lobbyState === 'game') {
        if (e.key === 'ArrowLeft' || e.key === 'a' || e.key === 'A') keys.l = true;
        if (e.key === 'ArrowRight' || e.key === 'd' || e.key === 'D') keys.r = true;
        if (e.key === 'ArrowUp' || e.key === 'w' || e.key === 'W' || e.key === ' ') { if (!keys.flap) flapEdge = true; keys.flap = true; }
        if (e.key === 'ArrowDown' || e.key === 's' || e.key === 'S') keys.dn = true;
      }
      e.preventDefault();
    });

    window.addEventListener('keyup', function (e) {
      if (lobbyState === 'lobby' || lobbyState === 'countdown') {
        if (e.key === ' ' || e.key === 'ArrowUp') {
          releaseHold();
          return;
        }
      }
      if (lobbyState === 'game') {
        if (e.key === 'ArrowLeft' || e.key === 'a' || e.key === 'A') keys.l = false;
        if (e.key === 'ArrowRight' || e.key === 'd' || e.key === 'D') keys.r = false;
        if (e.key === 'ArrowUp' || e.key === 'w' || e.key === 'W' || e.key === ' ') keys.flap = false;
        if (e.key === 'ArrowDown' || e.key === 's' || e.key === 'S') keys.dn = false;
      }
    });

    // Touch input with orientation-aware zones
    var touchHolding = false;
    var touchZoneFlash = { l: 0, r: 0, f: 0 }; // base flashes
    var touchZoneFlash6 = { le: 0, fl: 0, ri: 0, ft: 0, ap: 0, te: 0 }; // portrait 6-zone flashes
    function isPortrait() { return window.innerHeight > window.innerWidth; }
    // Returns touch zone(s) as {l:bool, r:bool, f:bool}
    function getTouchZones(clientX, clientY) {
      var w = window.innerWidth, h = window.innerHeight;
      var result = { l: false, r: false, f: false };
      if (isPortrait()) {
        // Portrait: top 1/3 = status, bottom 2/3 = 6 zones (3 cols × 2 rows)
        // Row 0 (upper): LE(left+flap) | FL(flap) | RI(right+flap)
        // Row 1 (lower): FT(left)      | AP(flap) | TE(right)
        if (clientY < h / 3) return result; // status area
        var col = clientX / w;
        var midY = h / 3 + (h * 2 / 3) / 2;
        var isUpper = clientY < midY;
        if (col < 0.33) {
          result.l = true;
          if (isUpper) { result.f = true; touchZoneFlash6.le = 0.3; touchZoneFlash6.fl = 0.3; touchZoneFlash6.ap = 0.3; } // LE → LE + all FLAP
          else { touchZoneFlash6.ft = 0.3; } // FT only
        } else if (col > 0.67) {
          result.r = true;
          if (isUpper) { result.f = true; touchZoneFlash6.ri = 0.3; touchZoneFlash6.fl = 0.3; touchZoneFlash6.ap = 0.3; } // RI → RI + all FLAP
          else { touchZoneFlash6.te = 0.3; } // TE only
        } else {
          result.f = true;
          touchZoneFlash6.fl = 0.3; touchZoneFlash6.ap = 0.3; // FLAP → FL + AP
        }
      } else {
        // Landscape: left 1/5=LEFT (no flap), next 1/5=RITE (no flap), right 1/5=FLAP
        var frac = clientX / w;
        if (frac < 0.2) result.l = true;
        else if (frac < 0.4) result.r = true;
        else if (frac > 0.8) result.f = true;
      }
      return result;
    }
    canvas.addEventListener('touchstart', function (e) {
      e.preventDefault(); initAudio();
      if (lobbyState === 'lobby' || lobbyState === 'countdown') {
        var scX = canvas.width / GW, scY = canvas.height / GH, sc = Math.min(scX, scY);
        var oX = (canvas.width - GW * sc) / 2, oY = (canvas.height - GH * sc) / 2;
        for (var ti = 0; ti < e.touches.length; ti++) {
          var tx = (e.touches[ti].clientX - oX) / sc;
          var ty = (e.touches[ti].clientY - oY) / sc;
          // Level left arrow area
          if (tx > GW * 0.3 && tx < GW * 0.4 && ty > 80 && ty < 140) { changeLevel(-1); return; }
          // Level right arrow area
          if (tx > GW * 0.6 && tx < GW * 0.7 && ty > 80 && ty < 140) { changeLevel(1); return; }
        }
        // Otherwise, hold to ready
        touchHolding = true;
        startHold();
        return;
      }
      if (lobbyState === 'gameover') {
        // Return to lobby
        lobbyState = 'lobby'; mySlotIndex = -1; cfg = null;
        for (var si = 0; si < 12; si++) { slots[si].peerId = null; slots[si].ready = false; slots[si].progress = 0; slots[si].holding = false; }
        gameBirds = []; aiBirds = []; dBirds = []; dRiders = []; fTexts = [];
        return;
      }
      if (lobbyState === 'game') {
        var anyFlap = false;
        for (var i = 0; i < e.touches.length; i++) {
          var zones = getTouchZones(e.touches[i].clientX, e.touches[i].clientY);
          if (zones.l) { keys.l = true; touchZoneFlash.l = 0.3; }
          if (zones.r) { keys.r = true; touchZoneFlash.r = 0.3; }
          if (zones.f) { anyFlap = true; touchZoneFlash.f = 0.3; }
        }
        if (anyFlap) { flapEdge = true; keys.flap = true; }
      }
    }, { passive: false });

    canvas.addEventListener('touchend', function (e) {
      if (lobbyState === 'lobby' || lobbyState === 'countdown') {
        if (touchHolding) { touchHolding = false; releaseHold(); }
        return;
      }
      if (lobbyState === 'game') {
        keys.l = false; keys.r = false; keys.flap = false;
      }
    });

    // ============================================================
    // CANVAS RESIZE
    // ============================================================
    function resizeCanvas() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }

    // ============================================================
    // MAIN GAME LOOP
    // ============================================================
    function gameLoop(now) {
      if (!lastTime) lastTime = now;
      var dt = (now - lastTime) / 1000;
      lastTime = now;
      if (dt > 0.05) dt = 0.05;
      if (dt < 0.001) dt = 0.001;

      if (lobbyState === 'lobby') {
        updateHold();
        renderLobby();
      }
      else if (lobbyState === 'countdown') {
        updateHold();
        updateCountdown(dt);
        renderLobby();
      }
      else if (lobbyState === 'game') {
        // Send input to host
        sendInputToHost();
        // Decay touch zone flash timers
        if (touchZoneFlash.l > 0) touchZoneFlash.l -= dt * 2;
        if (touchZoneFlash.r > 0) touchZoneFlash.r -= dt * 2;
        if (touchZoneFlash.f > 0) touchZoneFlash.f -= dt * 2;
        for (var zk in touchZoneFlash6) { if (touchZoneFlash6[zk] > 0) touchZoneFlash6[zk] -= dt * 2; }

        // Run physics (host runs authoritative, non-host runs local prediction for own bird)
        if (isHost) {
          gameStep(dt);
          // Broadcast state at 20Hz
          lastHostBroadcast += dt;
          if (lastHostBroadcast >= HOST_BROADCAST_INTERVAL) {
            hostBroadcastState();
            lastHostBroadcast = 0;
          }
        } else {
          // Non-host: run FULL game engine locally for responsiveness
          // Host state corrections are applied smoothly via applyHostState
          gameStep(dt);
        }

        renderGame();
      }
      else if (lobbyState === 'gameover') {
        renderGame();
      }
      else if (lobbyState === 'observer') {
        // Observer: update lava/platforms for rendering, no physics
        if (cfg) {
          updateLava(dt);
          for (var i = 0; i < plats.length; i++) plats[i].update(dt);
        }
        // If no state received for 5 seconds, host is gone — return to lobby
        if (lastStateRecvTime > 0 && performance.now() - lastStateRecvTime > 5000) {
          console.log('Observer: no state for 5s — returning to lobby');
          lobbyState = 'lobby'; mySlotIndex = -1; cfg = null;
          for (var si = 0; si < 12; si++) { slots[si].peerId = null; slots[si].ready = false; slots[si].progress = 0; slots[si].holding = false; }
          gameBirds = []; aiBirds = []; dBirds = []; dRiders = []; fTexts = [];
        }
        renderGame();
        // Draw OBSERVER overlay
        var scX = canvas.width / GW, scY = canvas.height / GH, sc = Math.min(scX, scY);
        var oX = (canvas.width - GW * sc) / 2, oY = (canvas.height - GH * sc) / 2;
        ctx.save(); ctx.translate(oX, oY); ctx.scale(sc, sc);
        ctx.fillStyle = 'rgba(255,255,255,0.15)';
        ctx.font = 'bold 120px monospace'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
        ctx.fillText('OBSERVER', GW / 2, GH / 2);
        ctx.font = '28px monospace'; ctx.fillStyle = 'rgba(255,255,255,0.4)';
        ctx.fillText('Game in progress — waiting for next round', GW / 2, GH / 2 + 80);
        ctx.restore();
      }

      // Periodic game logging (every second)
      if ((lobbyState === 'game' || lobbyState === 'gameover') && Math.floor(gameTime) !== Math.floor(gameTime - dt) && gameTime > 0.5) {
        var birdInfo = gameBirds.map(function(b) { return { pid: b.peerId ? b.peerId.slice(0,4) : '?', x: Math.round(b.x), y: Math.round(b.y), st: b.st, alive: b.alive, resp: b.resp, lv: playerLives[b.peerId]||0 }; });
        console.log('GAME', JSON.stringify({ t: gameTime.toFixed(1), wave: wave, host: isHost, birds: birdInfo, ai: aiBirds.length, db: dBirds.length, dr: dRiders.length, stSent: statesSent, stRecv: statesReceived, inSent: inputsSent, inRecv: inputsReceived }));
        // Full entity dump every 5 seconds
        if (Math.floor(gameTime) % 5 === 0) {
          var aiInfo = aiBirds.map(function(b) { return { x: Math.round(b.x), y: Math.round(b.y), st: b.st, alive: b.alive, mode: b.aiMode, hasR: !!b.rider }; });
          var drInfo = dRiders.map(function(r) { return { x: Math.round(r.x), y: Math.round(r.y), st: r.st, alive: r.alive, isP: r.isP }; });
          var dbInfo = dBirds.map(function(b) { return { x: Math.round(b.x), y: Math.round(b.y), alive: b.alive }; });
          var platInfo = plats.map(function(p) { return { id: p.id, w: Math.round(p.w), alive: p.alive }; });
          console.log('DUMP', JSON.stringify({ t: gameTime.toFixed(1), pLives: playerLives, pScores: playerScores, ai: aiInfo, dr: drInfo, db: dbInfo, plats: platInfo }));
        }
      }
      hud.textContent = BUILD + ' | ' + myPeerId.slice(0, 4) + ' | ' + (isHost ? 'HOST' : 'client') + ' | ' + lobbyState;
      requestAnimationFrame(gameLoop);
    }

    // ============================================================
    // INIT
    // ============================================================
    function init() {
      resizeCanvas();
      window.addEventListener('resize', resizeCanvas);

      // Run benchmark
      myBenchmark = runBenchmark();
      console.log('Benchmark score:', myBenchmark);

      // Room code: only use if explicitly in URL (from QR code scan)
      // Otherwise, server groups by WAN IP automatically
      var urlParams = new URLSearchParams(window.location.search);
      var roomCode = urlParams.get('room') || '';
      window._roomCode = roomCode;

      // For the QR code, generate a room code so cross-IP devices can join
      // (handles IPv4/IPv6 mismatch when scanning QR)
      if (!roomCode) {
        roomCode = Math.random().toString(36).slice(2, 8);
        window._qrRoomCode = roomCode;
      }
      console.log('Room:', roomCode ? 'code:' + roomCode : 'auto (WAN IP)');

      // QR code always includes a room code for reliable cross-device joining
      var qrUrl = 'https://erd.mmec.ca/gm1/?room=' + (window._qrRoomCode || roomCode);
      qrCanvas = generateQR(qrUrl);

      // Connect to signaling server
      connectSignaling();

      // Start game loop
      requestAnimationFrame(gameLoop);
    }

    init();
  </script>
</body>
